<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>📝Notes App</h1>
        
        <h2>🔎 Search Notes</h2>
        <input type="text" id="searchInput" placeholder="Search notes...">
       
          
        <h2>➕Add Notes</h2>
        <textarea placeholder="Write your note..." id="noteInput"></textarea>
        <button id ="addBtn" type="submit">➕ Add Note</button>

        <div id="notesContainer"><h2>📝Notes📋</h2>
            <p id="emptyMessage">
                No notes yet...
            </p>
        </div>
    </div>
     <script src="script.js"></script>
</body>
</html>
